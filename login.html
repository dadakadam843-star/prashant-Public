<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Service Hub - Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#005eff;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#005eff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#003bb5;
}

.note{
text-align:center;
margin-top:10px;
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<div class="login-box">

<h2>🏛️ Public Service Hub</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
🔐 Login
</button>

<p class="note">
Admin Login Panel
</p>

</div>

<script>

function login(){

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

if(
user==="admin" &&
pass==="12345"
){

alert("Login Success");

window.location.href=
"admin.html";

}else{

alert("Wrong Username Or Password");

}

}

</script>

</body>
</html>
