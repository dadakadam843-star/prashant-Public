<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajratna Online Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)), url('pvc.jpg');
background-size:cover;
background-position:center;
text-align:center;
padding:60px 20px;
}

.hero img{
width:90px;
}

.hero h1{
font-size:26px;
margin:10px 0;
}

.hero p{
color:#cbd5f5;
}

.btn{
background:#22c55e;
padding:12px 20px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
margin-top:15px;
display:inline-block;
text-decoration:none;
}

/* SECTION */
.section{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

/* FORM */
input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
text-decoration:none;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<img src="logo.png">
<h1>राजरत्न ऑनलाईन हब</h1>
<p>सर्व सरकारी सेवा एकाच ठिकाणी</p>

<a href="https://wa.me/919607023105" class="btn">WhatsApp करा</a>
</div>

<!-- SERVICES -->
<div class="section">

<div class="card">
<h3>आमच्या सेवा</h3>
<p>बांधकाम नोंदणी (Scholarship)</p>
<p>PVC Card – ₹60</p>
<p>आधार / पॅन / मतदान</p>
<p>लायसन्स</p>
<p>सरकारी योजना</p>
</div>

<!-- IMAGES -->
<div class="card">
<h3>कामाचे फोटो</h3>

<div class="grid">
<img src="pvc.jpg">
<img src="construction.jpg">
<img src="aadhaar.jpg">
<img src="voter.jpg">
</div>

</div>

<!-- FORM -->
<div class="card">
<h3>माहिती भरा</h3>

<input type="text" id="name" placeholder="नाव">
<input type="tel" id="mobile" placeholder="मोबाइल">

<select id="service">
<option>PVC Card</option>
<option>बांधकाम</option>
<option>आधार</option>
</select>

<button onclick="sendForm()" class="btn">Submit</button>
</div>

</div>

<a class="float" href="https://wa.me/919607023105">💬</a>

<script>
function sendForm(){
let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let service=document.getElementById("service").value;

let msg=`नाव: ${name}%0Aमोबाइल: ${mobile}%0Aसेवा: ${service}`;

window.open("https://wa.me/919607023105?text="+msg);
}
</script>

</body>
</html>
