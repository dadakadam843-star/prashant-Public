<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rajratna Online Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(-45deg,#0f172a,#1e293b,#020617,#0f172a);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
color:white;
}

@keyframes gradientMove {
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HERO */
.hero{
background:rgba(0,0,0,0.5);
text-align:center;
padding:50px 20px;
}

.hero img{width:90px;}

.btn{
background:#22c55e;
padding:12px;
border-radius:8px;
color:white;
text-decoration:none;
display:block;
margin-top:10px;
}

/* SECTION */
.section{padding:15px;}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

label{display:block;margin:6px 0;}

.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* POPUP */
#offerPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#fff;
color:#000;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
text-align:center;
animation:slideUp 0.8s ease;
}

/* ANIMATIONS */
@keyframes blinkGlow {
0%{opacity:1;color:#ff0000;}
50%{opacity:0.4;color:#ffff00;}
100%{opacity:1;color:#22c55e;}
}
.blink-glow{animation:blinkGlow 1s infinite;}

@keyframes slideUp {
0%{transform:translateY(60px);opacity:0;}
100%{transform:translateY(0);opacity:1;}
}

@keyframes pulse {
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
.pulse{animation:pulse 1.2s infinite;}

</style>
</head>

<body>

<!-- SOUND -->
<audio id="alertSound" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>

<!-- POPUP -->
<div id="offerPopup">
<div class="popup-box">

<h2 class="blink-glow">🎉 1 मे ऑफर 🎉</h2>

<p>✔️ बांधकाम नोंदणी मोफत</p>
<p>✔️ 2 / 4 व्हिलर लायसन्स</p>

<p class="blink-glow">🚨 प्रथम 60 जणांसाठी 🚨</p>

<a href="https://wa.me/919607023105" class="btn pulse">WhatsApp करा</a>
<br>
<button onclick="closePopup()">Close</button>

</div>
</div>

<!-- HERO -->
<div class="hero">

<img src="logo.png">

<h2 id="typing"></h2>

<p style="color:#facc15;">सेवक संघटना</p>

<p style="font-size:22px; font-weight:bold; color:#22c55e;">
ऑनलाईन सर्व्हिस सेंटर
</p>

<a href="https://wa.me/919607023105" class="btn pulse">📲 WhatsApp करा</a>

</div>

<div class="section">

<!-- OFFER -->
<div class="card">

<h3 class="blink-glow" style="text-align:center;">
🎉 1 मे कामगार दिन ऑफर 🎉
</h3>

<h3 id="countdown" style="text-align:center;color:#facc15;"></h3>

<p>✔️ बांधकाम नोंदणी मोफत</p>
<p>✔️ लायसन्स कॅम्प</p>

<p class="blink-glow">🚨 प्रथम 60 जणांसाठी 🚨</p>

<a href="https://wa.me/919607023105" class="btn pulse">
📲 संपर्क करा
</a>

</div>

<!-- SERVICES -->
<div class="card">
<h3>👉 सेवा निवडा</h3>

<form id="serviceForm">

<label><input type="checkbox" value="बांधकाम नोंदणी"> बांधकाम</label>
<label><input type="checkbox" value="रहिवाशी"> रहिवाशी</label>
<label><input type="checkbox" value="उत्पन्न"> उत्पन्न</label>
<label><input type="checkbox" value="रेशन कार्ड"> रेशन</label>
<label><input type="checkbox" value="आधार"> आधार</label>

<button type="button" onclick="sendServices()" class="btn">
👉 WhatsApp करा
</button>

</form>
</div>

</div>

<a class="float" href="https://wa.me/919607023105">💬</a>

<script>
// typing
let text="राजरत्न इंटरप्रायझेस";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,80);
}
}
type();

// popup
function showPopup(){
document.getElementById("offerPopup").style.display="flex";
document.getElementById("alertSound").play();
}
function closePopup(){
document.getElementById("offerPopup").style.display="none";
}
setTimeout(showPopup,2000);
setInterval(showPopup,30000);

// countdown
var end=new Date("May 1, 2026 10:00:00").getTime();
setInterval(function(){
var now=new Date().getTime();
var d=end-now;
var days=Math.floor(d/(1000*60*60*24));
var h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
var m=Math.floor((d%(1000*60*60))/(1000*60));
var s=Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML=
"⏳ "+days+"d "+h+"h "+m+"m "+s+"s";
},1000);

// whatsapp
function sendServices(){
let selected=[];
document.querySelectorAll('#serviceForm input:checked').forEach(el=>{
selected.push(el.value);
});
if(selected.length==0){alert("सेवा निवडा");return;}
let msg="मला सेवा हवी:%0A";
selected.forEach(i=>{msg+=i+"%0A";});
window.open("https://wa.me/919607023105?text="+msg);
}
</script>

</body>
</html>
