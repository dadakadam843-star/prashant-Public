<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj Enterprises</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#0d3b66; color:white; padding:15px; text-align:center;}
.banner {background:orange; color:white; text-align:center; padding:20px;}
.section {padding:20px;}
.box {background:white; margin:10px 0; padding:15px; border-radius:8px;}
input {width:90%; padding:10px; margin:5px 0;}
button {background:green; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;}
.whatsapp {
    position:fixed; bottom:20px; right:20px;
    background:#25D366; color:white;
    padding:15px; border-radius:50%; font-size:20px;
}
</style>

</head>

<body>

<header>
<h2>Raj Enterprises</h2>
<p>Bharat Nagar, दत्ता मंदिर जवळ</p>
<p>📞 8484078016 / 9607023105</p>
</header>

<div class="banner">
<h3 id="offerText">बांधकाम कामगार योजना नोंदणी सुरू आहे</h3>

<input type="text" id="offerInput" placeholder="नवीन ऑफर लिहा">
<br><br>
<button onclick="changeOffer()">Update Offer</button>
</div>

<div class="section">

<div class="box">
<h3>🏗️ कामगार योजना</h3>
<p>नोंदणी | नूतनीकरण | शिष्यवृत्ती</p>
</div>

<div class="box">
<h3>💻 Online Services</h3>
<p>आधार | पॅन | लाईसन्स | 7/12 | इतर सेवा</p>
</div>

<div class="box">
<h3>💳 PVC Card Offer</h3>
<p><b>100 कार्ड = ₹30 प्रति</b></p>
</div>

<div class="box">
<h3>📝 संपर्क फॉर्म</h3>
<input type="text" id="name" placeholder="नाव">
<input type="text" id="mobile" placeholder="मोबाईल नंबर">
<button onclick="sendWhatsApp()">Submit</button>
</div>

</div>

<a class="whatsapp" href="https://wa.me/918484078016" target="_blank">💬</a>

<script>

// Offer change + save
function changeOffer() {
    let val = document.getElementById("offerInput").value.trim();
    if(val === "") {
        alert("ऑफर लिहा");
        return;
    }
    localStorage.setItem("offerText", val);
    document.getElementById("offerText").innerText = val;
    document.getElementById("offerInput").value = "";
}

// Page load ला offer load
window.onload = function() {
    let saved = localStorage.getItem("offerText");
    if(saved){
        document.getElementById("offerText").innerText = saved;
    }
}

// WhatsApp form
function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;

    if(name === "" || mobile === ""){
        alert("माहिती भरा");
        return;
    }

    let msg = `नाव: ${name}%0Aमोबाईल: ${mobile}`;
    window.open(`https://wa.me/918484078016?text=${msg}`, "_blank");
}

</script>

</body>
</html>
