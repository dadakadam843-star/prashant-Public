<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj Enterprises</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

header {
background:#0d3b66;
color:white;
padding:15px;
text-align:center;
}

header img {
display:block;
margin:auto;
width:200px;
margin-bottom:10px;
}

.banner {
background:orange;
color:white;
text-align:center;
padding:20px;
}

.section {padding:20px;}

.box {
background:white;
margin:10px 0;
padding:15px;
border-radius:8px;
}

input {width:90%; padding:10px; margin:5px 0;}
button {background:green; color:white; padding:10px; border:none; border-radius:5px;}

label {display:block;}

.admin-btn {
position:fixed;
top:10px;
right:10px;
background:black;
color:white;
padding:10px;
}

.admin-panel {
display:none;
position:fixed;
top:20%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
}

.whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
}
</style>

</head>

<body>

<!-- ADMIN BUTTON -->
<button class="admin-btn" onclick="openAdmin()">Admin</button>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="adminContent" style="display:none;">
<h4>Offer Update</h4>
<input type="text" id="offer">
<button onclick="saveOffer()">Save</button>
</div>
</div>

<header>
<img src="logo.png">
<h2>Raj Enterprises</h2>
<p>Bharat Nagar, दत्ता मंदिर जवळ</p>
<p>📞 8484078016 / 9607023105</p>
</header>

<div class="banner">
<h3 id="offerText">बांधकाम कामगार योजना नोंदणी सुरू आहे</h3>
</div>

<div class="section">

<div class="box">
<h3>📝 सेवा निवडा (✔️ टिक करा)</h3>

<input type="text" id="name" placeholder="नाव">
<input type="text" id="mobile" placeholder="मोबाईल नंबर">

<label><input type="checkbox" value="आधार कार्ड"> आधार कार्ड</label>
<label><input type="checkbox" value="पॅन कार्ड"> पॅन कार्ड</label>
<label><input type="checkbox" value="मतदान कार्ड"> मतदान कार्ड</label>
<label><input type="checkbox" value="रेशन कार्ड"> रेशन कार्ड</label>
<label><input type="checkbox" value="लाईसन्स"> लाईसन्स</label>
<label><input type="checkbox" value="बांधकाम कार्ड"> बांधकाम कार्ड</label>
<label><input type="checkbox" value="ईश्रम कार्ड"> ईश्रम कार्ड</label>
<label><input type="checkbox" value="PM योजना"> PM योजना</label>
<label><input type="checkbox" value="PVC Card"> PVC Card</label>

<br>
<button onclick="sendWhatsApp()">Submit</button>
</div>

</div>

<a class="whatsapp" href="https://wa.me/918484078016">💬</a>

<script>

// ADMIN
function openAdmin(){
document.getElementById("adminPanel").style.display="block";
}

function login(){
if(document.getElementById("pass").value=="1234"){
document.getElementById("adminContent").style.display="block";
}else{
alert("Wrong Password");
}
}

function saveOffer(){
let val=document.getElementById("offer").value;
localStorage.setItem("offerText", val);
document.getElementById("offerText").innerText=val;
alert("Saved");
}

// LOAD OFFER
window.onload=function(){
let saved=localStorage.getItem("offerText");
if(saved){
document.getElementById("offerText").innerText=saved;
}
}

// WHATSAPP
function sendWhatsApp(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;

let selected=[];
document.querySelectorAll("input[type=checkbox]:checked").forEach(cb=>{
selected.push(cb.value);
});

if(name==""||mobile==""||selected.length==0){
alert("सगळी माहिती भरा");
return;
}

let services=selected.join(", ");

let ownerMsg=`नाव: ${name}%0Aमोबाईल: ${mobile}%0Aसेवा: ${services}`;
let customerMsg=`नमस्कार ${name}, तुमची विनंती मिळाली आहे: ${services}`;

// तुमच्याकडे
window.open(`https://wa.me/918484078016?text=${ownerMsg}`);

// ग्राहकाला
setTimeout(()=>{
window.open(`https://wa.me/91${mobile}?text=${customerMsg}`);
},1500);

}

</script>

</body>
</html>
