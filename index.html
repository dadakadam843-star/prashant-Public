  <div style="background:#fff; color:#000; padding:20px; border-radius:10px; text-align:center; width:80%;">

<div class="card">
<h3>👉 तुमचं काम निवडा</h3>

<form id="form">

<label><input type="checkbox" value="PVC कार्ड"> PVC कार्ड</label>
<label><input type="checkbox" value="बांधकाम नोंदणी"> बांधकाम नोंदणी</label>

</form>

<a class="float" href="https://wa.me/919607023105">💬</a>

<script>
// popup
window.onload = function(){
setTimeout(function(){
document.getElementById("offerPopup").style.display="flex";
},2000);
}

function closePopup(){
document.getElementById("offerPopup").style.display="none";
}

// whatsapp
function send(){
let selected=[];
document.querySelectorAll('#form input:checked').forEach(el=>{
selected.push(el.value);
});

if(selected.length==0){
alert("कृपया निवडा");
return;
}

let msg="मला सेवा हवी आहे:%0A";
selected.forEach(i=>{
msg += "👉 "+i+"%0A";
});

window.open("https://wa.me/919607023105?text="+msg);
}
</script>
