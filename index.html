<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj Enterprises</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#020617;color:white;}
header{text-align:center;padding:20px;background:#1e3a8a;}
.btn{background:#25D366;padding:12px;border:none;border-radius:8px;color:white;}
.box{background:#111;padding:15px;margin:10px;border-radius:10px;}
input,select{width:100%;padding:10px;margin:5px 0;}
</style>
</head>

<body>

<header>
<h2>Raj Enterprises</h2>
<p>📞 8484078016 / 9607023105</p>
</header>

<div class="box">
<h2>⚠️ तुमचं काम राहिलं आहे का?</h2>

<label><input type="checkbox" value="PVC Card ₹60"> PVC Card ₹60</label>
<label><input type="checkbox" value="बांधकाम नोंदणी + Scholarship"> बांधकाम + Scholarship</label>
<label><input type="checkbox" value="आधार"> आधार</label>
<label><input type="checkbox" value="पॅन"> पॅन</label>

<button onclick="sendWhatsApp()" class="btn">📲 माझं काम पूर्ण करा</button>
</div>

<div class="box">
<h3>📋 तुमची माहिती भरा</h3>

<input type="text" id="name" placeholder="नाव">
<input type="tel" id="mobile" placeholder="मोबाइल">

<select id="service">
<option>PVC Card</option>
<option>बांधकाम नोंदणी</option>
</select>

<button onclick="sendForm()" class="btn">Submit</button>
</div>

<script>

function sendWhatsApp(){
let selected=[];
document.querySelectorAll("input[type=checkbox]:checked").forEach(cb=>{
selected.push(cb.value);
});

let msg="मला सेवा हवी आहे: "+selected.join(", ");

window.open("https://wa.me/919607023105?text="+encodeURIComponent(msg));
}

function sendForm(){
let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let service=document.getElementById("service").value;

let msg=`नाव: ${name}\nमोबाइल: ${mobile}\nसेवा: ${service}`;

window.open("https://wa.me/919607023105?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
