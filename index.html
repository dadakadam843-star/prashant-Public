<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rajratna Services</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f0f4ff;
}

/* HEADER */
.header{
  background:linear-gradient(90deg,#0d47a1,#1976d2);
  color:#fff;
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

/* STICKY BAR */
.sticky-bar{
  position:fixed;
  top:0;
  width:100%;
  background:red;
  color:#fff;
  text-align:center;
  padding:10px;
  z-index:9999;
  font-weight:bold;
}

/* CARD */
.card{
  margin:80px 15px 15px;
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* TEXT */
.center{
  text-align:center;
  font-size:18px;
}

/* BLINK */
.limit{
  text-align:center;
  font-size:20px;
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* BUTTON */
.btn{
  display:block;
  margin:10px auto;
  padding:12px;
  background:#25D366;
  color:#fff;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
}

/* FLOAT WA */
.float-wa{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  font-size:28px;
  padding:15px;
  border-radius:50%;
}

/* POPUP */
.popup{
  position:fixed;
  top:30%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border-radius:10px;
  z-index:999;
  box-shadow:0 0 15px #000;
  text-align:center;
}

/* LIVE BOX */
.live-box{
  position:fixed;
  bottom:90px;
  left:10px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:8px;
  font-size:14px;
}

/* TIMER */
.timer{
  text-align:center;
  font-size:22px;
  color:#d32f2f;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="sticky-bar">
🔥 PAN + PVC अर्जंट ₹257 – 3 तासात 🔥
</div>

<div class="header">
राजरत्न इंटरप्राइजेस
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<h3>🔥 आजची ऑफर 🔥</h3>
<p>बांधकाम कामगार नोंदणी मोफत</p>
<p class="limit">🚨 मर्यादित स्लॉट 🚨</p>
<button onclick="closePopup()">Close</button>
</div>

<div class="card">

<p class="limit">🏗️ कामगार नोंदणी फ्री</p>

<p class="center">
PAN + PVC अर्जंट – ₹257<br>
3 तासात मिळेल
</p>

<p class="timer" id="countdown"></p>

<a href="https://wa.me/919607023105" class="btn">📲 WhatsApp करा</a>

</div>

<!-- FLOAT BUTTON -->
<a href="https://wa.me/919607023105" class="float-wa">💬</a>

<!-- LIVE ACTIVITY -->
<div id="liveActivity" class="live-box"></div>

<!-- SOUND -->
<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

// SOUND
window.onload = function(){
  document.getElementById("sound").play();
}

// POPUP
function closePopup(){
  document.getElementById("popup").style.display="none";
}

// POPUP REPEAT
setInterval(()=>{
  document.getElementById("popup").style.display="block";
  document.getElementById("sound").play();
},15000);

// COUNTDOWN
let time = 3*60*60;
setInterval(()=>{
let h=Math.floor(time/3600);
let m=Math.floor((time%3600)/60);
let s=time%60;

document.getElementById("countdown").innerHTML =
"⏳ वेळ उरलेली: "+h+":"+m+":"+s;

time--;
},1000);

// LIVE ACTIVITY
let names=["Rahul","Amit","Suresh","Vikas"];
let services=["PAN","PVC","लायसन्स","आधार"];

setInterval(()=>{
let n=names[Math.floor(Math.random()*names.length)];
let s=services[Math.floor(Math.random()*services.length)];

document.getElementById("liveActivity").innerHTML =
"✅ "+n+" यांनी "+s+" सेवा घेतली";
},5000);

</script>

</body>
</html>
