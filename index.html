<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Public Service Hub - Profile</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:linear-gradient(90deg,#ff6f00,#005eff);
color:#fff;
text-align:center;
padding:30px;
}

.profile-card{
background:#fff;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
border:5px solid #005eff;
object-fit:cover;
}

.name{
font-size:28px;
font-weight:bold;
margin-top:10px;
color:#005eff;
}

.designation{
color:#666;
margin:5px 0;
}

.about{
margin-top:15px;
line-height:1.6;
}

.btn{
display:block;
text-decoration:none;
padding:12px;
margin:10px 0;
border-radius:10px;
color:#fff;
font-weight:bold;
}

.call{background:#28a745;}
.whatsapp{background:#25D366;}
.email{background:#ff6f00;}
.share{background:#005eff;}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
}

.footer{
text-align:center;
padding:20px;
color:#666;
}
</style>
</head>

<body>

<div class="header">
<h1>🏛️ Public Service Hub</h1>
<p>तुमची सेवा, आमची जबाबदारी</p>
</div>

<div class="profile-card">

<img src="logo.png" class="profile-img">

<div class="name">प्रशांत कदम</div>

<div class="designation">
समाजसेवक | डिजिटल सेवा केंद्र
</div>

<div class="about">
मी नागरिकांना विविध सरकारी सेवा, योजना,
ऑनलाईन नोंदणी आणि मार्गदर्शन पुरवतो.
</div>

<a href="tel:+919607023105" class="btn call">
📞 Call Now
</a>

<a href="https://wa.me/919607023105" class="btn whatsapp">
💬 WhatsApp
</a>

<a href="mailto:info@publicservicehub.in" class="btn email">
📧 Email
</a>

<button onclick="shareProfile()" class="btn share">
🔗 Share Profile
</button>

<h3>📸 फोटो गॅलरी</h3>

<div class="gallery">
<img src="aadhaar.jpg">
<img src="pvc.jpg">
<img src="voter.jpg">
</div>

</div>

<div class="footer">
© 2025 Public Service Hub
</div>

<script>
function shareProfile(){
if(navigator.share){
navigator.share({
title:"Public Service Hub",
text:"माझे प्रोफाइल पहा",
url:window.location.href
});
}else{
alert("Share feature not supported");
}
}
</script>

</body>
</html>
