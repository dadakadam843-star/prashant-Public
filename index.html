<!DOCTYPE html>

<head>

<title>Rajratna Online Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0f172a;

}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)), url('pvc.jpg');
background-size:cover;
text-align:center;
padding:50px 20px;
}

.hero img{
width:90px;
}

.btn{
background:#22c55e;
padding:12px;
border:none;
border-radius:8px;
color:white;
width:100%;
margin-top:10px;
}

/* CARD */
.section{
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

label{
display:block;
margin:6px 0;
}

/* IMAGES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;

}
</style>
</head>

<body>

<div class="section">

<div class="card">

<label><input type="checkbox" value="संजय गांधी योजना"> संजय गांधी योजना</label>

<label><input type="checkbox" value="रहिवासी दाखला"> रहिवासी दाखला</label>

<label><input type="checkbox" value="4 चाकी लायसन्स"> 4 चाकी लायसन्स</label>

<label><input type="checkbox" value="PM Vishwakarma"> PM Vishwakarma</label>
<label><input type="checkbox" value="PM Svanidhi"> PM Svanidhi</label>
<label><input type="checkbox" value="PMEGP"> PMEGP</label>
<label><input type="checkbox" value="CMEGP"> CMEGP</label>

👉 WhatsApp करा

</form>

<!-- IMAGES -->
<div class="card">

<div class="grid">
<img src="pvc.jpg">

<a class="float" href="https://wa.me/919607023105">💬</a>

<script>
function sendServices(){

let selected=[];

document.querySelectorAll('#serviceForm input:checked').forEach(el=>{
selected.push(el.value);
});

if(selected.length==0){
alert("कृपया सेवा निवडा");
return;
}

let msg="नमस्कार 🙏%0Aमला खालील सेवा हवी आहे:%0A";

selected.forEach(item=>{
msg += "👉 " + item + "%0A";
});

window.open("https://wa.me/919607023105?text="+msg);
}
</script>

</body>
</html>
