<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rajratna Online Service</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

/* HEADER */
.header{
  background:linear-gradient(90deg,#0d47a1,#1976d2);
  color:#fff;
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  text-shadow:1px 1px 2px #000;
}

/* CARD */
.card{
  background:#fff;
  margin:15px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* TITLE */
.offer-title{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  color:#0d47a1;
  text-shadow:1px 1px 2px #ccc;
}

/* TEXT */
.center{
  text-align:center;
  font-size:18px;
}

/* LIMIT */
.limit{
  text-align:center;
  font-size:20px;
  color:red;
  font-weight:bold;
  animation:blink 1s infinite;
}

/* BLINK */
@keyframes blink{
  50%{opacity:0;}
}

/* BUTTON */
.btn{
  display:block;
  margin:15px auto;
  padding:12px;
  background:#25D366;
  color:#fff;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
  font-size:18px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
सेवक संघटित व असंघटित आरोग्य कामगार संघटना, महाराष्ट्र राज्य  
<br>राजरत्न इंटरप्राइजेस
</div>

<div class="card" id="offerBox"></div>

<div class="footer">
📍 भारत नगर, दत्ता मंदिर जवळ, मिरज  
<br>📲 WhatsApp: 9607023105
</div>

<script>

// WEEKLY AUTO OFFER
function loadOffer(){

let day = new Date().getDay();
let offer = "";

switch(day){

case 1:
offer = `
<h3 class="offer-title">🎉 सोमवार विशेष ऑफर 🎉</h3>
<p class="center">✔️ PAN + PVC Combo ₹199</p>
<p class="center">✔️ फॉर्म तपासणी मोफत</p>
<p class="limit">🚨 फक्त 20 जणांसाठी 🚨</p>
<p class="center" style="color:green;">💰 10% सवलत</p>
`;
break;

case 2:
offer = `
<h3 class="offer-title">🎉 मंगळवार ऑफर 🎉</h3>
<p class="center">✔️ बांधकाम नोंदणी सवलतीत</p>
<p class="limit">🚨 मर्यादित स्लॉट 🚨</p>
`;
break;

case 3:
offer = `
<h3 class="offer-title">🎉 बुधवार ऑफर 🎉</h3>
<p class="center">✔️ लायसन्स कॅम्प Special</p>
<p class="limit">🚨 आजच अर्ज करा 🚨</p>
`;
break;

case 4:
offer = `
<h3 class="offer-title">🎉 गुरुवार ऑफर 🎉</h3>
<p class="center">✔️ PAN / PVC Discount</p>
`;
break;

case 5:
offer = `
<h3 class="offer-title">🎉 शुक्रवार ऑफर 🎉</h3>
<p class="center">✔️ आयुष्मान कार्ड ₹60</p>
`;
break;

case 6:
offer = `
<h3 class="offer-title">🎉 शनिवार मेगा ऑफर 🎉</h3>
<p class="center">✔️ Combo + Family Offer</p>
<p class="limit">🚨 जास्त गर्दी – लवकर या 🚨</p>
`;
break;

default:
offer = `
<h3 class="offer-title">🎉 रविवार स्पेशल 🎉</h3>
<p class="center">✔️ सर्व सेवांवर Discount</p>
<p class="center">✔️ Free Document Check</p>
`;
}

// BUTTON
offer += `
<a href="javascript:void(0)" onclick="sendWA()" class="btn">
📲 WhatsApp करा
</a>
`;

document.getElementById("offerBox").innerHTML = offer;
}

// WHATSAPP
function sendWA(){
let msg="नमस्कार 🙏 मला आजच्या ऑफर बद्दल माहिती हवी आहे";
window.open("https://wa.me/919607023105?text="+encodeURIComponent(msg));
}

// LOAD
loadOffer();

</script>

</body>
</html>
