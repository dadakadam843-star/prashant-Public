<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Generator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

.header{
background:linear-gradient(90deg,#ff6f00,#005eff);
color:white;
padding:25px;
}

.card{
background:white;
max-width:600px;
margin:20px auto;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#005eff;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
}

.result{
margin-top:20px;
padding:15px;
background:#f0f0f0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<h1>🎬 AI Video Generator</h1>
<p>Rajratna Enterprises</p>
</div>

<div class="card">

<h3>व्हिडिओ विषय लिहा</h3>

<input type="text" id="topic"
placeholder="उदा. बांधकाम कामगार नोंदणी">

<button onclick="generateVideo()">
Generate Video Script
</button>

<div id="result" class="result">
इथे AI व्हिडिओ स्क्रिप्ट दिसेल
</div>

</div>

<script>
function generateVideo(){

let topic =
document.getElementById("topic").value;

document.getElementById("result").innerHTML =
"🎬 व्हिडिओ विषय: " + topic +
"<br><br>नमस्कार मित्रांनो, आज आपण "
+ topic +
" विषयी संपूर्ण माहिती जाणून घेणार आहोत...";
}
</script>

</body>
</html>
